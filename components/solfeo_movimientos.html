<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Movimientos de Dirección — Solfeo</title>
<style>
:root{
  --bg:#f9f7f2;--surface:#fff;--s2:#f1ede5;--border:#e0d9ce;
  --text:#1c1a16;--muted:#7a7468;--accent:#2d5fa3;--abg:#e8f0fb;
  --ok:#1a7a4a;--okbg:#e6f5ed;--r:12px;--rs:8px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#18160e;--surface:#252118;--s2:#1d1b13;--border:#38342a;
    --text:#f0ece4;--muted:#9a9282;--accent:#6b9de8;--abg:#1a2840;
    --ok:#4ecb85;--okbg:#0e2a1c;
  }
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Georgia',serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:2rem 1rem 3rem;
}
.w{width:100%;max-width:480px;}
header{text-align:center;margin-bottom:1.75rem;}
h1{font-size:1.05rem;font-weight:normal;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.sub{font-size:.68rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:.25rem;}

.cbox{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.75rem;margin-bottom:.875rem;}
canvas{display:block;width:100%;}

.bd{display:flex;align-items:center;justify-content:center;gap:1.25rem;margin-bottom:1.1rem;}
.bn{font-size:3.5rem;font-weight:bold;line-height:1;color:var(--accent);min-width:2.5rem;text-align:center;transition:color .1s;}
.binfo{display:flex;flex-direction:column;gap:3px;}
.bname{font-size:.72rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;}
.bdir{font-size:1rem;color:var(--text);font-style:italic;}

.pats{display:flex;gap:6px;margin-bottom:.875rem;}
.pb{
  flex:1;padding:9px 4px 8px;border:1px solid var(--border);border-radius:var(--rs);
  background:var(--surface);color:var(--muted);font-family:'Georgia',serif;
  font-size:.78rem;cursor:pointer;text-align:center;transition:all .12s;line-height:1.3;
}
.pb .t{font-size:1rem;font-weight:bold;display:block;color:var(--text);}
.pb .n{font-size:.6rem;display:block;letter-spacing:.04em;text-transform:uppercase;margin-top:1px;}
.pb.a{background:var(--abg);border-color:var(--accent);}
.pb.a .t,.pb.a .n{color:var(--accent);}

.ctrl{display:flex;align-items:center;gap:.75rem;margin-bottom:.875rem;}
.cl{font-size:.68rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;}
input[type=range]{flex:1;}
.bv{font-size:.92rem;font-weight:bold;min-width:28px;text-align:right;}
.tw{font-size:.7rem;color:var(--muted);min-width:58px;letter-spacing:.03em;text-transform:uppercase;}

.plbtn{
  width:100%;padding:12px;border:1px solid var(--accent);border-radius:var(--rs);
  background:var(--abg);color:var(--accent);font-family:'Georgia',serif;font-size:.9rem;
  cursor:pointer;letter-spacing:.05em;transition:all .15s;margin-bottom:.875rem;
}
.plbtn:hover{background:var(--accent);color:#fff;}
.plbtn.on{background:var(--accent);color:#fff;}

.hint{
  text-align:center;font-size:.78rem;color:var(--muted);font-style:italic;
  margin-bottom:.875rem;padding:.5rem .75rem;border:1px solid var(--border);
  border-radius:var(--rs);background:var(--surface);
}

.dbox{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:.8rem 1rem;}
.dt{font-size:.65rem;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;}
.dr{display:flex;gap:5px;flex-wrap:wrap;}
.dc{
  font-size:.74rem;padding:5px 10px;border-radius:99px;
  background:var(--surface);border:.5px solid var(--border);color:var(--muted);
  transition:all .12s;
}
.dc b{color:var(--text);}
.dc.a{background:var(--abg);border-color:var(--accent);color:var(--accent);}
.dc.a b{color:var(--accent);}

.legend{margin-top:.75rem;display:flex;gap:1rem;font-size:.7rem;color:var(--muted);}
.li{display:flex;align-items:center;gap:5px;}
</style>
</head>
<body>
<div class="w">
  <header>
    <h1>Movimientos de Dirección</h1>
    <div class="sub">Clave de Sol — Patrones de compás</div>
  </header>

  <div class="cbox">
    <canvas id="c" width="600" height="500"></canvas>
  </div>

  <div class="bd">
    <div class="bn" id="bn">—</div>
    <div class="binfo">
      <div class="bname" id="bname">elige compás y pulsa iniciar</div>
      <div class="bdir" id="bdir"></div>
    </div>
  </div>

  <div class="pats">
    <button class="pb a" onclick="selPat('2/4',this)"><span class="t">2/4</span><span class="n">Péndulo</span></button>
    <button class="pb"   onclick="selPat('3/4',this)"><span class="t">3/4</span><span class="n">Triángulo</span></button>
    <button class="pb"   onclick="selPat('4/4',this)"><span class="t">4/4</span><span class="n">Cuadrado</span></button>
    <button class="pb"   onclick="selPat('6/8',this)"><span class="t">6/8</span><span class="n">Péndulo</span></button>
  </div>

  <div class="ctrl">
    <span class="cl">Tempo</span>
    <input type="range" id="sl" min="40" max="160" value="72" step="1" oninput="setBpm(+this.value)"/>
    <span class="bv" id="bv">72</span>
    <span class="cl">♩</span>
    <span class="tw" id="tw">Adagio</span>
  </div>

  <button class="plbtn" id="plbtn" onclick="tog()">▶ Iniciar</button>

  <div class="hint" id="hint">Selecciona un compás para comenzar.</div>

  <div class="dbox">
    <div class="dt">Tiempos del compás</div>
    <div class="dr" id="dr"></div>
    <div class="legend" id="leg"></div>
  </div>
</div>

<script>
// ── Canvas setup ──────────────────────────────────────────────────────────────
const W=300, H=250, CX=150, CY=125;
const cv=document.getElementById('c');
const ct=cv.getContext('2d');
ct.scale(2,2);  // canvas buffer 600×500 → coordinate space 300×250

// ── Colors (dark-mode aware) ──────────────────────────────────────────────────
const dk=window.matchMedia('(prefers-color-scheme:dark)').matches;
const C={
  path:   dk?'rgba(120,112,100,0.22)':'rgba(160,150,138,0.22)',
  arrow:  dk?'rgba(120,112,100,0.45)':'rgba(160,150,138,0.45)',
  dot:    dk?'#f0ece4':'#1c1a16',
  trail:  dk?'#6b9de8':'#2d5fa3',
  bInact: dk?'rgba(50,46,36,0.95)':'rgba(228,220,208,0.8)',
  bAct:   dk?'#6b9de8':'#2d5fa3',
  bTxtI:  dk?'#5a5248':'#a09488',
  bTxtA:  '#ffffff',
  lbl:    dk?'#7a7268':'#8a8278',
  beat1:  dk?'#f0a060':'#c06020',  // warm accent for downbeat
};

function h2r(h,a){
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── Pattern data ──────────────────────────────────────────────────────────────
// pts:  array of beat arrival points, in order beat-1..beat-N
//       the motion for beat-1 starts from pts[N-1] (the previous return point)
// dirs: direction name for each beat
// lblc: label config [dx, dy, textAlign, textBaseline] relative to beat point
const PATS = {
  '2/4':{
    name:'Péndulo', beats:2, bu:'♩',
    pts:  [[150,218],[150,32]],
    dirs: ['Abajo','Arriba'],
    strengths: [1.0, 0.3],
    lblc: [[0,22,'center','top'],[0,-22,'center','bottom']],
    hint: '"Un — dos,   un — dos…"  —  el movimiento más simple: solo arriba y abajo.',
  },
  '3/4':{
    name:'Triángulo', beats:3, bu:'♩',
    pts:  [[150,218],[244,118],[150,32]],
    dirs: ['Abajo','Derecha','Arriba'],
    strengths: [1.0, 0.3, 0.3],
    lblc: [[0,22,'center','top'],[0,20,'center','top'],[0,-22,'center','bottom']],
    hint: '"Un-dos-tres…"  —  el recorrido forma un triángulo. El 1 siempre va abajo.',
  },
  '4/4':{
    name:'Cuadrado', beats:4, bu:'♩',
    pts:  [[150,218],[55,118],[245,118],[150,32]],
    dirs: ['Abajo','Izquierda','Derecha','Arriba'],
    strengths: [1.0, 0.3, 0.6, 0.3],
    lblc: [[0,22,'center','top'],[0,-20,'center','bottom'],[0,-20,'center','bottom'],[0,-22,'center','bottom']],
    hint: '"Un-dos-tres-cuatro…"  —  abajo, cruce izquierda, cruce derecha, arriba.',
  },
  '6/8':{
    name:'Péndulo', beats:2, bu:'♩.',
    pts:  [[150,218],[150,32]],
    dirs: ['Abajo','Arriba'],
    strengths: [1.0, 0.6],
    lblc: [[0,22,'center','top'],[0,-22,'center','bottom']],
    hint: 'Compás binario: dos pulsos de negra con puntillo. Abajo — arriba.',
  },
};

// ── State ─────────────────────────────────────────────────────────────────────
let pk='2/4', bpm=72, playing=false;
let t=0, lastTs=null, raf=null;
let curBeat=-1, prevBeat=0;
const trail=[], TRLEN=42;
let flashes={};
let aCtx=null;

// ── Audio ─────────────────────────────────────────────────────────────────────
function getAC(){
  if(!aCtx) aCtx=new(window.AudioContext||window.webkitAudioContext)();
  return aCtx;
}
function click(strength){
  try{
    const ac=getAC();
    const o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type='triangle';
    const freq=strength>=0.8?860:strength>=0.5?720:580;
    const gain=strength>=0.8?0.36:strength>=0.5?0.24:0.14;
    o.frequency.value=freq;
    g.gain.setValueAtTime(gain, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.09);
    o.start(ac.currentTime); o.stop(ac.currentTime+0.12);
  }catch(e){}
}

// ── Math helpers ──────────────────────────────────────────────────────────────
function smoothstep(x){ return x*x*(3-2*x); }

function gpos(pat, T){
  const n=pat.beats, pts=pat.pts;
  const raw=T*n, seg=Math.floor(raw)%n, lt=raw-Math.floor(raw);
  const e=smoothstep(lt);
  const from=seg===0?pts[n-1]:pts[seg-1], to=pts[seg];
  return{ x:from[0]+(to[0]-from[0])*e, y:from[1]+(to[1]-from[1])*e, seg };
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function drawArrow(x1,y1,x2,y2){
  const mx=(x1+x2)/2, my=(y1+y2)/2;
  const ang=Math.atan2(y2-y1,x2-x1), s=5.5;
  ct.save(); ct.translate(mx,my); ct.rotate(ang);
  ct.beginPath(); ct.moveTo(s,0); ct.lineTo(-s,-s*.58); ct.lineTo(-s,s*.58); ct.closePath();
  ct.fillStyle=C.arrow; ct.fill(); ct.restore();
}

function draw(){
  ct.clearRect(0,0,W,H);
  const pat=PATS[pk], n=pat.beats, pts=pat.pts;

  // ── Dashed static path + direction arrows
  ct.save(); ct.strokeStyle=C.path; ct.lineWidth=1.4; ct.setLineDash([5,5]);
  ct.beginPath(); ct.moveTo(pts[n-1][0],pts[n-1][1]);
  for(let i=0;i<n;i++) ct.lineTo(pts[i][0],pts[i][1]);
  ct.stroke(); ct.setLineDash([]); ct.restore();

  for(let i=0;i<n;i++){
    const from=i===0?pts[n-1]:pts[i-1], to=pts[i];
    drawArrow(from[0],from[1],to[0],to[1]);
  }

  // ── Trail
  for(let i=0;i<trail.length;i++){
    const f=i/TRLEN, r=1.5+f*5.5, a=f*.48;
    ct.beginPath(); ct.arc(trail[i].x,trail[i].y,r,0,Math.PI*2);
    ct.fillStyle=h2r(C.trail,a); ct.fill();
  }

  // ── Beat circles + labels
  for(let i=0;i<n;i++){
    const[bx,by]=pts[i];
    const isAct=playing&&curBeat===i;
    const fl=flashes[i]||0;
    const isDown=i===0; // downbeat

    // Flash ring
    if(fl>0){
      ct.beginPath(); ct.arc(bx,by,16+fl*12,0,Math.PI*2);
      ct.fillStyle=h2r(isDown?C.beat1:C.trail, fl*.18); ct.fill();
    }

    // Circle
    const cr=13;
    ct.beginPath(); ct.arc(bx,by,cr,0,Math.PI*2);
    ct.fillStyle=isAct?(isDown?C.beat1:C.bAct):C.bInact; ct.fill();

    // Beat number
    ct.fillStyle=isAct?C.bTxtA:C.bTxtI;
    ct.font=(isAct?'bold ':'')+'12px Georgia,serif';
    ct.textAlign='center'; ct.textBaseline='middle';
    ct.fillText(i+1,bx,by);

    // Direction label
    const[ox,oy,al,bl]=pat.lblc[i];
    ct.fillStyle=isAct?C.lbl.replace('82','99'):C.lbl;
    ct.font='9.5px Georgia,serif';
    ct.textAlign=al; ct.textBaseline=bl;
    ct.fillText(pat.dirs[i], bx+ox, by+oy);
  }

  // ── Animated dot (shown only when playing)
  if(playing){
    const pos=gpos(pat,t);
    ct.beginPath(); ct.arc(pos.x,pos.y,9,0,Math.PI*2);
    ct.fillStyle=C.dot; ct.fill();
    ct.beginPath(); ct.arc(pos.x,pos.y,4,0,Math.PI*2);
    ct.fillStyle=C.trail; ct.fill();
  }
}

// ── Animation loop ────────────────────────────────────────────────────────────
function animate(ts){
  if(!lastTs) lastTs=ts;
  const dt=Math.min((ts-lastTs)/1000, .15);
  lastTs=ts;

  const pat=PATS[pk];
  const cyc=pat.beats*(60/bpm);
  t=(t+dt/cyc)%1;

  const pos=gpos(pat,t);
  trail.push({x:pos.x,y:pos.y});
  if(trail.length>TRLEN) trail.shift();

  if(pos.seg!==prevBeat){
    prevBeat=pos.seg;
    curBeat=(pos.seg-1+pat.beats)%pat.beats;
    flashes[curBeat]=1.0;
    click(pat.strengths[curBeat]);
    // UI
    document.getElementById('bn').textContent=curBeat+1;
    document.getElementById('bname').textContent=pat.name;
    document.getElementById('bdir').textContent=pat.dirs[curBeat];
    document.querySelectorAll('.dc').forEach((c,i)=>c.classList.toggle('a',i===curBeat));
  }

  // Decay flashes
  for(const k of Object.keys(flashes)){
    flashes[k]-=.04;
    if(flashes[k]<=0) delete flashes[k];
  }

  draw();
  raf=requestAnimationFrame(animate);
}

// ── Controls ──────────────────────────────────────────────────────────────────
function tog(){
  const btn=document.getElementById('plbtn');
  if(playing){
    playing=false;
    cancelAnimationFrame(raf); raf=null; lastTs=null;
    btn.textContent='▶ Iniciar'; btn.classList.remove('on');
    document.getElementById('bn').textContent='—';
    document.getElementById('bname').textContent='pausado';
    document.getElementById('bdir').textContent='';
    document.querySelectorAll('.dc').forEach(c=>c.classList.remove('a'));
    trail.length=0; flashes={}; draw();
  }else{
    playing=true; t=0; prevBeat=0; curBeat=-1; trail.length=0; flashes={};
    btn.textContent='⏹ Detener'; btn.classList.add('on');
    raf=requestAnimationFrame(animate);
  }
}

function selPat(k, btn){
  if(playing) tog();
  pk=k; t=0; trail.length=0; flashes={}; prevBeat=0; curBeat=-1;
  document.querySelectorAll('.pb').forEach(b=>b.classList.remove('a'));
  btn.classList.add('a');
  document.getElementById('bn').textContent='—';
  document.getElementById('bname').textContent=PATS[k].name;
  document.getElementById('bdir').textContent='';
  document.getElementById('hint').textContent=PATS[k].hint;
  updDirs(); draw();
}

const TMPO=[[40,'Grave'],[60,'Largo'],[66,'Adagio'],[76,'Andante'],[108,'Moderato'],[120,'Allegro'],[156,'Presto']];
function tmpoName(b){ let n='Grave'; for(const[v,l]of TMPO){if(b>=v)n=l;} return n; }

function setBpm(v){
  bpm=v;
  document.getElementById('bv').textContent=v;
  document.getElementById('tw').textContent=tmpoName(v);
}

function updDirs(){
  const p=PATS[pk];
  document.getElementById('dr').innerHTML=
    p.dirs.map((d,i)=>`<span class="dc"><b>${i+1}</b> ${d}</span>`).join('');
  document.getElementById('leg').innerHTML=
    `<span class="li">Unidad de tiempo: <b>${p.bu}</b></span>
     <span class="li">${p.beats} tiempo${p.beats>1?'s':''} por compás</span>`;
}

// ── Init ──────────────────────────────────────────────────────────────────────
setBpm(72);
updDirs();
document.getElementById('hint').textContent=PATS[pk].hint;
document.getElementById('bname').textContent=PATS[pk].name;
draw();
</script>
</body>
</html>
