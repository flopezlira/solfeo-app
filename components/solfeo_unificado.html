<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Solfeo Unificado — Notas y Movimientos</title>
<style>
:root{
  --bg:#f9f7f2;--surface:#fff;--s2:#f1ede5;--border:#e0d9ce;
  --text:#1c1a16;--muted:#7a7468;--accent:#2d5fa3;--abg:#e8f0fb;
  --ok:#1a7a4a;--okbg:#e6f5ed;--okb:#9ed8bb;
  --err:#b33a2a;--errbg:#fdecea;--errb:#f5b0a6;
  --beat1:#c06020;--beat1bg:#fdebd8;
  --staff:#4a453c;--note:#1c1a16;
  --r:12px;--rs:8px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#18160e;--surface:#252118;--s2:#1d1b13;--border:#38342a;
    --text:#f0ece4;--muted:#9a9282;--accent:#6b9de8;--abg:#1a2840;
    --ok:#4ecb85;--okbg:#0e2a1c;--okb:#1e5c38;
    --err:#f07060;--errbg:#2a0f0a;--errb:#6b2318;
    --beat1:#e88840;--beat1bg:#2a1a08;
    --staff:#8a8278;--note:#f0ece4;
  }
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Georgia',serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:1.5rem 1rem 3rem;
}
.w{width:100%;max-width:500px;}
header{text-align:center;margin-bottom:1.5rem;}
h1{font-size:1rem;font-weight:normal;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.sub{font-size:.65rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:.2rem;}

/* Stats */
.stats{display:flex;justify-content:center;gap:2rem;margin-bottom:1.25rem;}
.stat{text-align:center;}
.sv{font-size:1.75rem;font-weight:bold;line-height:1;}
.sl{font-size:.6rem;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-top:2px;}

/* Main panel: conductor + staff side by side */
.panel{
  display:grid;grid-template-columns:1fr 1.6fr;
  gap:8px;margin-bottom:.875rem;
}

/* Conductor mini */
.cbox{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:.5rem;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.cbox canvas{display:block;width:100%;}
.beat-ind{
  font-size:2rem;font-weight:bold;color:var(--accent);
  line-height:1;min-height:2rem;text-align:center;
  transition:color .1s;
}
.beat-ind.b1{color:var(--beat1);}
.pat-name{font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}

/* Staff */
.sbox{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:.5rem;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.sbox svg{display:block;width:100%;}
.note-name-hint{
  font-size:.7rem;font-weight:bold;height:18px;text-align:center;
  letter-spacing:.04em;margin-top:4px;
}
.note-name-hint.ok{color:var(--ok);}
.note-name-hint.err{color:var(--err);}
.note-name-hint.miss{color:var(--muted);}

/* Feedback banner */
.fbanner{
  height:26px;text-align:center;font-size:.88rem;font-weight:bold;
  margin-bottom:.75rem;letter-spacing:.03em;transition:opacity .2s;
}
.fbanner.ok{color:var(--ok);}
.fbanner.err{color:var(--err);}
.fbanner.miss{color:var(--muted);}

/* Note buttons */
.notes-grid{
  display:grid;grid-template-columns:repeat(7,minmax(0,1fr));
  gap:5px;margin-bottom:.875rem;
}
.nb{
  padding:13px 0;border:1px solid var(--border);border-radius:var(--rs);
  background:var(--surface);color:var(--text);font-family:'Georgia',serif;
  font-size:.82rem;cursor:pointer;transition:background .08s,transform .07s;
  user-select:none;
}
.nb:active{transform:scale(.95);}
.nb.ok{background:var(--okbg);border-color:var(--okb);color:var(--ok);}
.nb.err{background:var(--errbg);border-color:var(--errb);color:var(--err);}
.nb.reveal{background:var(--okbg);border-color:var(--okb);color:var(--ok);}

/* Pattern + tempo controls */
.pats{display:flex;gap:5px;margin-bottom:.6rem;}
.pb{
  flex:1;padding:7px 3px 6px;border:1px solid var(--border);border-radius:var(--rs);
  background:var(--surface);color:var(--muted);font-family:'Georgia',serif;
  font-size:.75rem;cursor:pointer;text-align:center;transition:all .1s;
}
.pb .t{font-size:.9rem;font-weight:bold;display:block;color:var(--text);}
.pb .n{font-size:.55rem;display:block;text-transform:uppercase;letter-spacing:.04em;margin-top:1px;}
.pb.a{background:var(--abg);border-color:var(--accent);}
.pb.a .t,.pb.a .n{color:var(--accent);}

.ctrl{display:flex;align-items:center;gap:.6rem;margin-bottom:.875rem;}
.cl{font-size:.65rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;}
input[type=range]{flex:1;}
.bv{font-size:.85rem;font-weight:bold;min-width:24px;text-align:right;}
.tw{font-size:.65rem;color:var(--muted);min-width:54px;text-transform:uppercase;letter-spacing:.03em;}

.plbtn{
  width:100%;padding:11px;border:1px solid var(--accent);border-radius:var(--rs);
  background:var(--abg);color:var(--accent);font-family:'Georgia',serif;font-size:.88rem;
  cursor:pointer;letter-spacing:.05em;transition:all .15s;margin-bottom:.875rem;
}
.plbtn:hover{background:var(--accent);color:#fff;}
.plbtn.on{background:var(--accent);color:#fff;}

/* Progress bar */
.progbar{width:100%;height:3px;background:var(--border);border-radius:99px;margin-bottom:1.25rem;overflow:hidden;}
.progfill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s ease;width:0%;}

/* Countdown pulse ring on note */
.pulse{animation:pulse .15s ease-out;}
@keyframes pulse{from{opacity:1;transform:scale(1.2);}to{opacity:0;transform:scale(1.6);}}
</style>
</head>
<body>
<div class="w">
  <header>
    <h1>Solfeo — Notas y Dirección</h1>
    <div class="sub">Identifica la nota al compás del movimiento</div>
  </header>

  <div class="stats">
    <div class="stat"><div class="sv" id="sc">0</div><div class="sl">correctas</div></div>
    <div class="stat"><div class="sv" id="sr">0</div><div class="sl">racha</div></div>
    <div class="stat"><div class="sv" id="sm">0</div><div class="sl">perdidas</div></div>
  </div>

  <div class="progbar"><div class="progfill" id="pf"></div></div>

  <div class="panel">
    <!-- Conductor -->
    <div class="cbox">
      <canvas id="cc" width="240" height="200"></canvas>
      <div class="beat-ind" id="bi">—</div>
      <div class="pat-name" id="pn">2/4 · Péndulo</div>
    </div>

    <!-- Staff -->
    <div class="sbox">
      <svg id="sv" viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
        <!-- staff lines -->
        <line x1="38" y1="42"  x2="182" y2="42"  stroke="var(--staff)" stroke-width="1.3"/>
        <line x1="38" y1="56"  x2="182" y2="56"  stroke="var(--staff)" stroke-width="1.3"/>
        <line x1="38" y1="70"  x2="182" y2="70"  stroke="var(--staff)" stroke-width="1.3"/>
        <line x1="38" y1="84"  x2="182" y2="84"  stroke="var(--staff)" stroke-width="1.3"/>
        <line x1="38" y1="98"  x2="182" y2="98"  stroke="var(--staff)" stroke-width="1.3"/>
        <!-- ledger line for low Do -->
        <line id="ll" x1="95" y1="112" x2="115" y2="112" stroke="var(--staff)" stroke-width="1.3" opacity="0"/>
        <!-- G clef -->
        <text x="38" y="111" font-size="72" font-family="'Times New Roman',serif" fill="var(--staff)">𝄞</text>
        <!-- note head -->
        <ellipse id="nh" cx="105" cy="70" rx="9.5" ry="7" fill="var(--note)"/>
        <!-- stem -->
        <line id="ns" x1="114.5" y1="70" x2="114.5" y2="35" stroke="var(--note)" stroke-width="2"/>
        <!-- flash ring -->
        <ellipse id="nr" cx="105" cy="70" rx="9.5" ry="7" fill="none" stroke="var(--accent)" stroke-width="2" opacity="0"/>
      </svg>
      <div class="note-name-hint" id="nnh"></div>
    </div>
  </div>

  <div class="fbanner" id="fb"></div>

  <div class="notes-grid" id="btns">
    <button class="nb" onclick="chk('Do')">Do</button>
    <button class="nb" onclick="chk('Re')">Re</button>
    <button class="nb" onclick="chk('Mi')">Mi</button>
    <button class="nb" onclick="chk('Fa')">Fa</button>
    <button class="nb" onclick="chk('Sol')">Sol</button>
    <button class="nb" onclick="chk('La')">La</button>
    <button class="nb" onclick="chk('Si')">Si</button>
  </div>

  <div class="pats">
    <button class="pb a" onclick="selPat('2/4',this)"><span class="t">2/4</span><span class="n">Péndulo</span></button>
    <button class="pb"   onclick="selPat('3/4',this)"><span class="t">3/4</span><span class="n">Triángulo</span></button>
    <button class="pb"   onclick="selPat('4/4',this)"><span class="t">4/4</span><span class="n">Cuadrado</span></button>
    <button class="pb"   onclick="selPat('6/8',this)"><span class="t">6/8</span><span class="n">Péndulo</span></button>
  </div>

  <div class="ctrl">
    <span class="cl">Tempo</span>
    <input type="range" id="sl" min="40" max="120" value="60" step="1" oninput="setBpm(+this.value)"/>
    <span class="bv" id="bv">60</span>
    <span class="cl">♩</span>
    <span class="tw" id="tw">Largo</span>
  </div>

  <button class="plbtn" id="plbtn" onclick="tog()">▶ Iniciar</button>
</div>

<script>
// ── Note data ──────────────────────────────────────────────────────────────────
// Staff SVG viewBox 200×160. Lines at y=42,56,70,84,98. Ledger at y=112.
// Map: y position → note name
const NOTES=[
  {n:'Do', y:112,t:'line'},  {n:'Re',y:105,t:'space'},
  {n:'Mi', y:98, t:'line'},  {n:'Fa',y:91, t:'space'},
  {n:'Sol',y:84, t:'line'},  {n:'La',y:77, t:'space'},
  {n:'Si', y:70, t:'line'},  {n:'Do',y:63, t:'space'},
  {n:'Re', y:56, t:'line'},  {n:'Mi',y:49, t:'space'},
  {n:'Fa', y:42, t:'line'},
];

// ── Conducting patterns ────────────────────────────────────────────────────────
// Canvas is 120×100 (scaled ×2 for retina)
const CW=120,CH=100,CCX=60,CCY=50;
const PATS={
  '2/4':{name:'Péndulo',  beats:2, pts:[[60,90],[60,12]], strengths:[1.0,0.3]},
  '3/4':{name:'Triángulo',beats:3, pts:[[60,90],[100,50],[60,12]], strengths:[1.0,0.3,0.3]},
  '4/4':{name:'Cuadrado', beats:4, pts:[[60,90],[20,50],[100,50],[60,12]], strengths:[1.0,0.3,0.6,0.3]},
  '6/8':{name:'Péndulo', beats:2, pts:[[60,90],[60,12]], strengths:[1.0,0.6]},
};
const dk=window.matchMedia('(prefers-color-scheme:dark)').matches;
const CC={
  path: dk?'rgba(100,94,82,.28)':'rgba(160,150,138,.28)',
  dot:  dk?'#f0ece4':'#1c1a16',
  tr:   dk?'#6b9de8':'#2d5fa3',
  b1:   dk?'#e88840':'#c06020',
  bInact:dk?'rgba(50,46,36,.95)':'rgba(220,212,200,.85)',
  bAct: dk?'#6b9de8':'#2d5fa3',
  bti:  dk?'#5a5248':'#a09488',
  bta:  '#ffffff',
};
function h2r(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}

// ── State ──────────────────────────────────────────────────────────────────────
let pk='2/4', bpm=60;
let playing=false, raf=null, lastTs=null;
let t=0, prevBeat=0, curBeat=-1;
const trail=[], TRLEN=30;
let flashes={};
let aCtx=null;

// note state
let curNote=null, answered=false, missedCur=false;
let sc=0, str=0, missed=0;

// ── Canvas ────────────────────────────────────────────────────────────────────
const cv=document.getElementById('cc');
const ct=cv.getContext('2d');
cv.width=240; cv.height=200;
ct.scale(2,2);

function ss(x){return x*x*(3-2*x);}
function gpos(pat,T){
  const n=pat.beats,pts=pat.pts,raw=T*n,seg=Math.floor(raw)%n,lt=raw-Math.floor(raw);
  const e=ss(lt),from=seg===0?pts[n-1]:pts[seg-1],to=pts[seg];
  return{x:from[0]+(to[0]-from[0])*e,y:from[1]+(to[1]-from[1])*e,seg};
}

function drawArrow(x1,y1,x2,y2){
  const mx=(x1+x2)/2,my=(y1+y2)/2,ang=Math.atan2(y2-y1,x2-x1),s=4;
  ct.save();ct.translate(mx,my);ct.rotate(ang);
  ct.beginPath();ct.moveTo(s,0);ct.lineTo(-s,-s*.55);ct.lineTo(-s,s*.55);ct.closePath();
  ct.fillStyle=CC.path;ct.fill();ct.restore();
}

function drawConductor(){
  ct.clearRect(0,0,CW,CH);
  const pat=PATS[pk],n=pat.beats,pts=pat.pts;
  ct.save();ct.strokeStyle=CC.path;ct.lineWidth=1.2;ct.setLineDash([4,4]);
  ct.beginPath();ct.moveTo(pts[n-1][0],pts[n-1][1]);
  for(let i=0;i<n;i++)ct.lineTo(pts[i][0],pts[i][1]);
  ct.stroke();ct.setLineDash([]);ct.restore();
  for(let i=0;i<n;i++){
    const from=i===0?pts[n-1]:pts[i-1],to=pts[i];
    drawArrow(from[0],from[1],to[0],to[1]);
  }
  for(let i=0;i<trail.length;i++){
    const f=i/TRLEN,r=1+f*4,a=f*.4;
    ct.beginPath();ct.arc(trail[i].x,trail[i].y,r,0,Math.PI*2);
    ct.fillStyle=h2r(CC.tr,a);ct.fill();
  }
  for(let i=0;i<n;i++){
    const[bx,by]=pts[i],isA=playing&&curBeat===i,isDn=i===0,fl=flashes[i]||0;
    if(fl>0){
      ct.beginPath();ct.arc(bx,by,10+fl*8,0,Math.PI*2);
      ct.fillStyle=h2r(isDn?CC.b1:CC.tr,fl*.15);ct.fill();
    }
    ct.beginPath();ct.arc(bx,by,9,0,Math.PI*2);
    ct.fillStyle=isA?(isDn?CC.b1:CC.bAct):CC.bInact;ct.fill();
    ct.fillStyle=isA?CC.bta:CC.bti;
    ct.font=(isA?'bold ':'')+'9px Georgia,serif';
    ct.textAlign='center';ct.textBaseline='middle';
    ct.fillText(i+1,bx,by);
  }
  if(playing){
    const p=gpos(PATS[pk],t);
    ct.beginPath();ct.arc(p.x,p.y,7,0,Math.PI*2);
    ct.fillStyle=CC.dot;ct.fill();
    ct.beginPath();ct.arc(p.x,p.y,3,0,Math.PI*2);
    ct.fillStyle=CC.tr;ct.fill();
  }
}

// ── Staff note rendering ───────────────────────────────────────────────────────
function showNote(note){
  const nh=document.getElementById('nh'),ns=document.getElementById('ns'),ll=document.getElementById('ll');
  nh.setAttribute('cy',note.y);
  nh.setAttribute('cx','105');
  // Stem: up if low, down if high
  if(note.y>=70){
    ns.setAttribute('x1','114.5');ns.setAttribute('y1',note.y);
    ns.setAttribute('x2','114.5');ns.setAttribute('y2',note.y-38);
  }else{
    ns.setAttribute('x1','95.5');ns.setAttribute('y1',note.y);
    ns.setAttribute('x2','95.5');ns.setAttribute('y2',note.y+38);
  }
  ll.setAttribute('opacity',note.y===112?'.9':'0');
  // flash ring
  const nr=document.getElementById('nr');
  nr.setAttribute('cx','105');nr.setAttribute('cy',note.y);
  nr.setAttribute('rx','9.5');nr.setAttribute('ry','7');
}

function flashNote(){
  const nr=document.getElementById('nr');
  nr.setAttribute('opacity','1');
  setTimeout(()=>nr.setAttribute('opacity','0'),180);
}

function pickNote(){
  let n,tries=0;
  do{ n=NOTES[Math.floor(Math.random()*NOTES.length)];tries++; }
  while(curNote&&n.y===curNote.y&&tries<20);
  return n;
}

// ── Audio ──────────────────────────────────────────────────────────────────────
function getAC(){if(!aCtx)aCtx=new(window.AudioContext||window.webkitAudioContext)();return aCtx;}
function beep(strength){
  try{
    const ac=getAC(),o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type='triangle';
    o.frequency.value=strength>=0.8?860:strength>=0.5?720:580;
    const vol=strength>=0.8?0.36:strength>=0.5?0.24:0.14;
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.09);
    o.start();o.stop(ac.currentTime+.12);
  }catch(e){}
}

// ── Animation loop ─────────────────────────────────────────────────────────────
function animate(ts){
  if(!lastTs)lastTs=ts;
  const dt=Math.min((ts-lastTs)/1000,.15);
  lastTs=ts;
  const pat=PATS[pk];
  const cyc=pat.beats*(60/bpm);
  t=(t+dt/cyc)%1;
  const pos=gpos(pat,t);
  trail.push({x:pos.x,y:pos.y});
  if(trail.length>TRLEN)trail.shift();

  if(pos.seg!==prevBeat){
    prevBeat=pos.seg;
    const b=(pos.seg-1+pat.beats)%pat.beats;
    curBeat=b;
    flashes[b]=1.0;
    beep(pat.strengths[b]);

    // Beat UI
    const bi=document.getElementById('bi');
    bi.textContent=b+1;
    bi.className='beat-ind'+(b===0?' b1':'');

    // Missed previous note?
    if(curNote&&!answered&&!missedCur){
      missed++;
      document.getElementById('sm').textContent=missed;
      str=0;
      document.getElementById('sr').textContent=0;
      // reveal correct answer briefly
      document.querySelectorAll('.nb').forEach(btn=>{
        if(btn.textContent===curNote.n) btn.classList.add('reveal');
      });
      const nnh=document.getElementById('nnh');
      nnh.textContent='⟶ era '+curNote.n;
      nnh.className='note-name-hint miss';
      const fb=document.getElementById('fb');
      fb.textContent='Tiempo perdido — era '+curNote.n;
      fb.className='fbanner miss';
      setTimeout(()=>{
        document.querySelectorAll('.nb').forEach(btn=>btn.classList.remove('reveal'));
      },500);
    }

    // New note for this beat
    answered=false; missedCur=false;
    curNote=pickNote();
    showNote(curNote);
    flashNote();
    // clear button states
    document.querySelectorAll('.nb').forEach(b=>b.className='nb');
    document.getElementById('nnh').textContent='';
    document.getElementById('nnh').className='note-name-hint';
  }

  for(const k of Object.keys(flashes)){flashes[k]-=.05;if(flashes[k]<=0)delete flashes[k];}
  drawConductor();
  raf=requestAnimationFrame(animate);
}

// ── Answer ─────────────────────────────────────────────────────────────────────
function chk(ans){
  if(!playing||answered||!curNote)return;
  answered=true;
  const ok=ans===curNote.n;
  document.querySelectorAll('.nb').forEach(b=>{
    if(b.textContent===curNote.n) b.classList.add(ok?'ok':'reveal');
    if(b.textContent===ans&&!ok) b.classList.add('err');
  });
  const fb=document.getElementById('fb'),nnh=document.getElementById('nnh');
  if(ok){
    sc++;str++;
    fb.textContent='✓ ¡Correcto!'; fb.className='fbanner ok';
    nnh.textContent='✓ '+curNote.n; nnh.className='note-name-hint ok';
  }else{
    str=0;
    fb.textContent='✗ Era '+curNote.n; fb.className='fbanner err';
    nnh.textContent='✗ era '+curNote.n; nnh.className='note-name-hint err';
  }
  document.getElementById('sc').textContent=sc;
  document.getElementById('sr').textContent=str;
  document.getElementById('pf').style.width=Math.min(100,sc*4)+'%';
}

// ── Controls ───────────────────────────────────────────────────────────────────
function tog(){
  const btn=document.getElementById('plbtn');
  if(playing){
    playing=false;
    cancelAnimationFrame(raf);raf=null;lastTs=null;
    btn.textContent='▶ Iniciar';btn.classList.remove('on');
    document.getElementById('bi').textContent='—';
    document.getElementById('bi').className='beat-ind';
    document.getElementById('fb').textContent='';
    document.getElementById('fb').className='fbanner';
    document.getElementById('nnh').textContent='';
    document.querySelectorAll('.nb').forEach(b=>b.className='nb');
    trail.length=0;flashes={};curNote=null;
    drawConductor();
  }else{
    playing=true;t=0;prevBeat=0;curBeat=-1;trail.length=0;flashes={};
    curNote=null;answered=false;missedCur=false;
    btn.textContent='⏹ Detener';btn.classList.add('on');
    raf=requestAnimationFrame(animate);
  }
}

function selPat(k,btn){
  if(playing)tog();
  pk=k;t=0;trail.length=0;flashes={};prevBeat=0;curBeat=-1;curNote=null;
  document.querySelectorAll('.pb').forEach(b=>b.classList.remove('a'));
  btn.classList.add('a');
  document.getElementById('pn').textContent=k+' · '+PATS[k].name;
  document.getElementById('bi').textContent='—';
  document.getElementById('bi').className='beat-ind';
  drawConductor();
}

const TMPO=[[40,'Grave'],[60,'Largo'],[66,'Adagio'],[76,'Andante'],[108,'Moderato'],[120,'Allegro']];
function tmpoName(b){let n='Grave';for(const[v,l]of TMPO){if(b>=v)n=l;}return n;}
function setBpm(v){
  bpm=v;
  document.getElementById('bv').textContent=v;
  document.getElementById('tw').textContent=tmpoName(v);
